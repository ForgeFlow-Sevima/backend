name: Backend CI

on:
  push:
    branches:
      - master
      - forgeflow-mvp-backend
      - ci/github-actions-backend
      - feature/final-review-backend
  pull_request:
    branches:
      - master

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, tokenizer, pdo_sqlite, sqlite3
          coverage: none

      - name: Validate composer files
        run: composer validate --no-check-publish --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Run test suite
        run: php artisan test

  docker-build:
    name: Docker build artifact
    runs-on: ubuntu-latest
    needs: quality-and-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: forgeflow-backend:${{ github.sha }}
          outputs: type=docker,dest=/tmp/forgeflow-backend-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image
          path: /tmp/forgeflow-backend-image.tar
          retention-days: 7
